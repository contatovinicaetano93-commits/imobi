services:
  postgres:
    image: postgres:16-alpine
    container_name: imobi-postgres-local
    environment:
      POSTGRES_USER: imobi_user
      POSTGRES_PASSWORD: imobi_secure_password_123
      POSTGRES_DB: imobi_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imobi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: imobi-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
