global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'imbobi-monitor'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "prometheus-alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Imbobi API
  - job_name: 'imbobi-api'
    static_configs:
      - targets: ['localhost:4000']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    # Honor labels from metrics
    honor_labels: true

  # Optional: Node Exporter for system metrics
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['localhost:9100']

  # Optional: PostgreSQL Exporter
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['localhost:9187']

  # Optional: Redis Exporter
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['localhost:9121']
