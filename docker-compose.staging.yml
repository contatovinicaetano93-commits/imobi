services:
  postgres:
    image: postgres:16-alpine
    container_name: imobi-staging-postgres
    environment:
      POSTGRES_DB: imobi_staging
      POSTGRES_USER: imobi
      POSTGRES_PASSWORD: staging_password_secure_12345
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imobi"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: imobi-staging-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
