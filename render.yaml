services:
  # ── NestJS API ────────────────────────────────────────
  - type: web
    name: imobi-api
    runtime: docker
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    plan: free
    region: virginia
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: imobi-postgres
          property: connectionString
      # Redis — copiar conexão do imobi-staging-cache no painel Render
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      # Obrigatório — setar manualmente:
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: APP_URL
        sync: false
      # Opcional — habilita email (esqueci senha):
      - key: EMAIL_PROVIDER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

databases:
  # ── PostgreSQL ────────────────────────────────────────
  - name: imobi-postgres
    plan: free
    region: virginia
    databaseName: imobi_prod
    user: imobi
    postgresMajorVersion: 15
