# Fluent Bit Configuration para Imbobi
# Log Aggregation e envio para Datadog
# Documentação: https://docs.datadoghq.com/logs/guide/log-parsing-best-practice/

[SERVICE]
    # Flush interval em segundos
    Flush         5
    Daemon        off
    Log_Level     info
    Parsers_File  parsers.conf

# ============================================================================
# INPUTS - Leitura de logs
# ============================================================================

# Docker logs da API
[INPUT]
    Name              docker
    Tag               imbobi.api
    Path              /var/lib/docker/containers/*
    Parser            docker-json
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# Docker logs do Redis
[INPUT]
    Name              docker
    Tag               imbobi.redis
    Path              /var/lib/docker/containers/*
    Parser            redis-json
    DB                /var/log/flb_redis.db
    Mem_Buf_Limit     30MB
    Skip_Long_Lines   On

# Docker logs do PostgreSQL
[INPUT]
    Name              docker
    Tag               imbobi.postgres
    Path              /var/lib/docker/containers/*
    Parser            postgres-json
    DB                /var/log/flb_postgres.db
    Mem_Buf_Limit     30MB
    Skip_Long_Lines   On

# Syslog (se aplicável)
[INPUT]
    Name              syslog
    Tag               imbobi.syslog
    Listen            0.0.0.0
    Port              514
    Parser            syslog-json

# ============================================================================
# FILTERS - Processamento de logs
# ============================================================================

# Parser: Extrair informações estruturadas
[FILTER]
    Name              parser
    Match             imbobi.api
    Key_Name          log
    Parser            json
    Preserve_Key      On
    Reserve_Data      On

# Adicionar contexto
[FILTER]
    Name              record_modifier
    Match             imbobi.*
    Record            environment production
    Record            service imbobi
    Record            version ${APP_VERSION}

# Enriquecer com informações de container
[FILTER]
    Name              docker
    Match             imbobi.*
    Keep_Log          On

# Sampling: Reduzir volume de logs
[FILTER]
    Name              sampling
    Match             imbobi.api
    Sample            10  # Log 1 de cada 10 mensagens em LOW severity

# Multiline: Combinar stack traces
[FILTER]
    Name              multiline
    Match             imbobi.api
    Emitter_Name      multiline-parser
    Emitter_Mem_Limit 50MB
    Parser_Multiline  multiline-regex
    Parser_Firstline  multiline-start

# ============================================================================
# OUTPUTS - Envio de logs
# ============================================================================

# Datadog Logs (principal)
[OUTPUT]
    Name              datadog
    Match             imbobi.*
    Host              http-intake.logs.datadoghq.com
    apikey            ${DATADOG_API_KEY}
    provider          gcp
    json_date_key     timestamp
    dd_service        ${DD_SERVICE}
    dd_source         kubernetes
    dd_tags           env:production,service:imbobi
    Retry_Limit       5

# Backup: S3 (para auditoria/compliance)
[OUTPUT]
    Name              s3
    Match             imbobi.api
    bucket            imbobi-logs-backup
    region            us-east-1
    s3_key_format     /logs/api/%Y/%m/%d/%H/%M-%S-${HOSTNAME}.json
    json_date_key     timestamp
    use_put_object    On
    retry_limit       5

# Stdout (debug em dev)
[OUTPUT]
    Name              stdout
    Match             imbobi.api
    Format            json_lines

# ============================================================================
# PARSERS - Formatos de log esperados
# ============================================================================

[PARSER]
    Name              docker-json
    Format            json
    Time_Key          time
    Time_Format       %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep         On

[PARSER]
    Name              json
    Format            json
    Time_Key          timestamp
    Time_Format       %Y-%m-%dT%H:%M:%S.%LZ

[PARSER]
    Name              redis-json
    Format            json
    Time_Key          time
    Time_Format       %d %b %Y %H:%M:%S.%L

[PARSER]
    Name              postgres-json
    Format            json
    Time_Key          timestamp
    Time_Format       %Y-%m-%d %H:%M:%S

[PARSER]
    Name              syslog-json
    Format            json
    Time_Key          timestamp

# Multiline para stack traces
[MULTILINE_PARSER]
    Name              multiline-regex
    Flush_timeout     1000
    Rule              "start_state" "/^(Error|Exception|at )" "cont"
    Rule              "cont" "/^(  |  at |Caused by)/" "cont"
