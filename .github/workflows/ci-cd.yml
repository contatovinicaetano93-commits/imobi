# CI quality gate. Deploy real: Vercel auto-deploy na branch main (Vercel + Neon).

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PRODUCTION_WEB_URL: https://imobi-web-ten.vercel.app

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: TypeScript Type Check
        run: pnpm type-check

      - name: ESLint & Format Check
        run: pnpm lint

  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  # Após merge em main, Vercel já faz deploy. Só valida que ficou saudável.
  production-health-gate:
    name: Production Health Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Check API health
        run: |
          set -e
          for attempt in 1 2 3; do
            BODY=$(curl -sf "${{ env.PRODUCTION_WEB_URL }}/api/v1/health" || true)
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ API healthy (attempt $attempt)"
              exit 0
            fi
            echo "⏳ Attempt $attempt/3 — waiting 15s..."
            sleep 15
          done
          echo "❌ API unhealthy after 3 attempts"
          exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  status:
    name: Workflow Status
    runs-on: ubuntu-latest
    if: always()
    needs: [validate, build, production-health-gate]
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.validate.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Core CI jobs failed"
            exit 1
          fi
          if [ "${{ needs.production-health-gate.result }}" = "failure" ]; then
            echo "❌ Production health gate failed"
            exit 1
          fi
          echo "✅ Workflow passed all checks"
