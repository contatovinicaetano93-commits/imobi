# API quality gate — sem deploy automático.
# Deploy: Render (auto-deploy no dashboard) + pnpm render:env:push / render:redeploy
# Web: Vercel. Ver docs/DEPLOY_STACK.md

name: API Quality Check

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.npmrc'
      - '.github/workflows/deploy-api.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.npmrc'
  workflow_dispatch:

concurrency:
  group: api-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages and generate Prisma client
        run: |
          pnpm --filter @imbobi/schemas build
          pnpm --filter @imbobi/core build
          pnpm db:generate

      - name: Type check
        run: pnpm type-check

      - name: Lint API
        run: pnpm --filter @imbobi/api lint

      - name: Build API
        run: pnpm build:api

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'services/api'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  post-check:
    name: Staging Health Gate
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check Render staging health (retry)
        run: |
          set -e
          URL="https://imobi-api-staging.onrender.com/api/v1/health"
          for attempt in 1 2 3 4 5; do
            BODY=$(curl -sf "$URL" || true)
            if echo "$BODY" | grep -q '"status":"ok"'; then
              echo "✅ Staging API healthy (attempt $attempt)"
              exit 0
            fi
            echo "⏳ Attempt $attempt/5..."
            sleep 30
          done
          echo "❌ Staging API unhealthy"
          exit 1
