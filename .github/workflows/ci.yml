name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.0.0"

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @imbobi/api build

      - name: Build Web
        run: pnpm --filter @imbobi/web build

      - name: Build Mobile
        run: pnpm --filter @imbobi/mobile run build:preview

      - name: Upload API build
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: api-build
          path: services/api/dist
          retention-days: 7

      - name: Upload Web build
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod || true

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "imbobi"
          path: "."
          format: "JSON"
          args: >
            --enableExperimental

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All checks passed"
