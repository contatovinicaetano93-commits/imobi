# E2E contra staging — roda de madrugada e sob demanda.
# Secrets opcionais: E2E_TOMADOR_EMAIL, E2E_TOMADOR_PASSWORD, E2E_GESTOR_*, E2E_ENGENHEIRO_*
name: E2E Staging Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-staging-nightly
  cancel-in-progress: true

env:
  E2E_BASE_URL: https://imobi-web-ten.vercel.app
  E2E_API_URL: https://imobi-api-staging.onrender.com/api/v1

jobs:
  e2e-staging:
    name: Playwright staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @imbobi/e2e exec playwright install chromium --with-deps

      - name: Wait for staging API
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "$E2E_API_URL/health" | grep -q '"status":"ok"'; then
              echo "✅ API ready"
              exit 0
            fi
            sleep 20
          done
          echo "❌ API not ready"
          exit 1

      - name: Run E2E staging suite
        run: pnpm test:e2e:staging
        env:
          E2E_TOMADOR_EMAIL: ${{ secrets.E2E_TOMADOR_EMAIL }}
          E2E_TOMADOR_PASSWORD: ${{ secrets.E2E_TOMADOR_PASSWORD }}
          E2E_GESTOR_EMAIL: ${{ secrets.E2E_GESTOR_EMAIL }}
          E2E_GESTOR_PASSWORD: ${{ secrets.E2E_GESTOR_PASSWORD }}
          E2E_ENGENHEIRO_EMAIL: ${{ secrets.E2E_ENGENHEIRO_EMAIL }}
          E2E_ENGENHEIRO_PASSWORD: ${{ secrets.E2E_ENGENHEIRO_PASSWORD }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
