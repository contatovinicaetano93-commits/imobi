name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: imobi_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Wait for services to be ready
        run: |
          echo "Waiting for PostgreSQL at localhost:5432..."
          for i in {1..60}; do
            if timeout 1 bash -c "echo > /dev/tcp/localhost/5432" 2>/dev/null; then
              echo "✓ PostgreSQL port is open"
              break
            fi
            echo "Attempt $i/60..."
            sleep 1
          done

          echo "Waiting for Redis at localhost:6379..."
          for i in {1..60}; do
            if timeout 1 bash -c "echo > /dev/tcp/localhost/6379" 2>/dev/null; then
              echo "✓ Redis port is open"
              break
            fi
            echo "Attempt $i/60..."
            sleep 1
          done

          sleep 3

      - name: Generate Prisma Client
        run: cd services/api && npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/imobi_test
          NODE_ENV: test
        run: cd services/api && pnpm exec prisma migrate deploy

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/imobi_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-for-testing-purposes-only
          CORS_ORIGINS: http://localhost:3000,http://localhost:3001
          API_PORT: 4000
        run: cd services/api && pnpm test -- --testPathPattern="e2e" --forceExit --detectOpenHandles

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./services/api/coverage/coverage-final.json
          flags: e2e
          name: E2E Coverage

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResultFile = './services/api/test-results.json';

            if (fs.existsSync(testResultFile)) {
              const results = JSON.parse(fs.readFileSync(testResultFile, 'utf8'));
              const summary = `
              ## E2E Test Results

              - **Total Tests**: ${results.numTotalTests}
              - **Passed**: ${results.numPassedTests}
              - **Failed**: ${results.numFailedTests}
              - **Skipped**: ${results.numPendingTests}
              - **Duration**: ${(results.testResults[0]?.perfStats?.end - results.testResults[0]?.perfStats?.start) / 1000}s
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }
