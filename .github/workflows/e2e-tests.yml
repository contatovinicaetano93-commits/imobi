name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Start services with docker-compose
        run: |
          echo "🚀 Checking docker and docker-compose..."
          docker --version
          docker-compose --version || docker compose version

          if docker compose version >/dev/null 2>&1; then
            DC="docker compose"
          else
            DC="docker-compose"
          fi

          echo "Starting services with docker-compose..."
          $DC -f docker-compose.test.yml up -d

          echo "⏳ Waiting for services to be ready..."
          sleep 5

          $DC -f docker-compose.test.yml ps

          echo "Testing PostgreSQL connectivity..."
          max_attempts=60
          for attempt in $(seq 1 $max_attempts); do
            echo "Attempt $attempt/$max_attempts..."
            $DC -f docker-compose.test.yml exec -T postgres pg_isready -U postgres && {
              echo "✅ PostgreSQL is ready"
              break
            } || true
            sleep 1
          done

          sleep 2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd services/api && npx prisma generate

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/imobi_test
          NODE_ENV: test
        run: |
          cd services/api
          pnpm exec prisma migrate deploy || pnpm exec prisma db push --accept-data-loss

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/imobi_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-key-for-testing-purposes-only
          CORS_ORIGIN: http://localhost:3000,http://localhost:3001
          API_PORT: 4000
        run: cd services/api && pnpm test -- --forceExit --detectOpenHandles --verbose 2>&1 | tee test-output.log

      - name: Cleanup services
        if: always()
        run: |
          echo "🧹 Stopping docker-compose services..."
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.test.yml down || true
          else
            docker-compose -f docker-compose.test.yml down || true
          fi

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./services/api/coverage/coverage-final.json
          flags: e2e
          name: E2E Coverage

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResultFile = './services/api/test-results.json';

            if (fs.existsSync(testResultFile)) {
              const results = JSON.parse(fs.readFileSync(testResultFile, 'utf8'));
              const summary = `
              ## E2E Test Results

              - **Total Tests**: ${results.numTotalTests}
              - **Passed**: ${results.numPassedTests}
              - **Failed**: ${results.numFailedTests}
              - **Skipped**: ${results.numPendingTests}
              - **Duration**: ${(results.testResults[0]?.perfStats?.end - results.testResults[0]?.perfStats?.start) / 1000}s
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }
