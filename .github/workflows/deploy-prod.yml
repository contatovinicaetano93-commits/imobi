name: Deploy Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/imbobi-api:prod-${{ github.sha }}
            ghcr.io/${{ github.repository }}/imbobi-api:prod-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository }}/imbobi-api:prod-${{ github.sha }}
        run: |
          echo "Deploying $DOCKER_IMAGE to production"
          # TODO: Add your production deployment script

      - name: Health check
        run: |
          sleep 15
          curl -f https://api.imbobi.com/api/v1/health || (
            echo "Health check failed - initiating rollback"
            exit 1
          )

      - name: Create GitHub Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: Production deployment successful

      - name: Notify Slack Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": ":rocket: Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployed Successfully*\nCommit: ${{ github.sha }}\nRelease: v${{ github.run_number }}"
                  }
                }
              ]
            }

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed - rolling back to previous version"
          # TODO: Add your rollback script
          exit 1

      - name: Notify Slack Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": ":x: Production deployment FAILED",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment FAILED*\nCommit: ${{ github.sha }}\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
