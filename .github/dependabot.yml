version: 2
updates:
  # NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "contato.vinicaetano93@gmail.com"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    groups:
      patch-minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    auto-merge:
      - match:
          update-type:
            - "patch"
            - "minor"
          dependency-type: "all"
          compatibility-score: 100
        commit-message: "auto-merge"

  # Docker images (if applicable)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 3
    auto-merge:
      - match:
          update-type:
            - "minor"
            - "patch"
        commit-message: "auto-merge"
