apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: imbobi-redis
  namespace: staging
spec:
  serviceName: imbobi-redis
  replicas: 1
  selector:
    matchLabels:
      app: imbobi-redis
  template:
    metadata:
      labels:
        app: imbobi-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - name: redis
          containerPort: 6379
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: imbobi-redis
  namespace: staging
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: redis
  selector:
    app: imbobi-redis
