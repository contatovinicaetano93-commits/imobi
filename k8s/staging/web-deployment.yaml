apiVersion: apps/v1
kind: Deployment
metadata:
  name: imbobi-web
  namespace: staging
  labels:
    app: imbobi-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: imbobi-web
  template:
    metadata:
      labels:
        app: imbobi-web
    spec:
      containers:
      - name: web
        image: registry.imbobi.com.br/web:v1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://staging-api.imbobi.com.br"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: imbobi-web
  namespace: staging
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: imbobi-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: imbobi-ingress
  namespace: staging
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - staging.imbobi.com.br
    - staging-api.imbobi.com.br
    secretName: imbobi-tls
  rules:
  - host: staging.imbobi.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: imbobi-web
            port:
              number: 80
  - host: staging-api.imbobi.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: imbobi-api
            port:
              number: 80
