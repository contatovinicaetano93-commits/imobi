# Prometheus Alert Rules for Imobi API
# P1 (Critical) and P2 (High) alerts for production monitoring

groups:
  - name: imobi_api_alerts
    interval: 15s
    rules:
      # P1: Critical Alerts (immediate action required)

      - alert: APIDown
        expr: up{job="imobi-api"} == 0
        for: 2m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "Imobi API is down"
          description: "API endpoint at {{ $labels.instance }} is not responding for more than 2 minutes"
          runbook: "https://wiki.imobi.com/runbooks/api-down"

      - alert: DatabaseConnectionFailed
        expr: imobi_database_connected == 0
        for: 1m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "Database connection failed"
          description: "Cannot connect to PostgreSQL database. Check DATABASE_URL and network connectivity"
          runbook: "https://wiki.imobi.com/runbooks/database-connection-failed"

      - alert: RedisConnectionFailed
        expr: imobi_redis_connected == 0
        for: 1m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "Redis connection failed"
          description: "Cannot connect to Redis cache. Check REDIS_URL and network connectivity"
          runbook: "https://wiki.imobi.com/runbooks/redis-connection-failed"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "High API error rate"
          description: "Error rate is > 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})"
          runbook: "https://wiki.imobi.com/runbooks/high-error-rate"

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 10m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "Disk space is critically low"
          description: "Disk space available is less than 10% on {{ $labels.instance }}"
          runbook: "https://wiki.imobi.com/runbooks/disk-space-low"

      - alert: MemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: critical
          priority: P1
        annotations:
          summary: "Memory usage critically high"
          description: "Memory usage is above 90% on {{ $labels.instance }}"
          runbook: "https://wiki.imobi.com/runbooks/high-memory-usage"

      # P2: High Priority Alerts (action required within 30 minutes)

      - alert: HighErrorRateWarning
        expr: rate(http_requests_total{status=~"5.."}[10m]) > 0.01
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "API error rate elevated"
          description: "Error rate is > 1% for the last 10 minutes (current: {{ $value | humanizePercentage }})"
          runbook: "https://wiki.imobi.com/runbooks/error-rate-warning"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "API response time is high"
          description: "P95 response time is > 2 seconds (current: {{ $value }}s)"
          runbook: "https://wiki.imobi.com/runbooks/high-response-time"

      - alert: QueueDepthGrowing
        expr: increase(bullmq_queue_size[10m]) > 100
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Job queue is growing"
          description: "Queue depth increased by {{ $value }} jobs in the last 10 minutes"
          runbook: "https://wiki.imobi.com/runbooks/queue-depth-growing"

      - alert: RateLimitingActive
        expr: rate(http_requests_total{status="429"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Rate limiting is active"
          description: "Requests are being rate limited (429 responses detected)"
          runbook: "https://wiki.imobi.com/runbooks/rate-limiting-active"

      - alert: SlowQueryDetected
        expr: rate(database_query_duration_seconds_bucket{le="+Inf"}[5m]) > 0 and rate(database_query_duration_seconds_bucket{le="1"}[5m]) / rate(database_query_duration_seconds_bucket{le="+Inf"}[5m]) < 0.8
        for: 10m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Slow database queries detected"
          description: "More than 20% of queries are taking longer than 1 second"
          runbook: "https://wiki.imobi.com/runbooks/slow-queries"

      - alert: DeploymentFailure
        expr: increase(deployment_failures_total[1h]) > 0
        for: 1m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Recent deployment failure"
          description: "A deployment failed in the last hour. Check deployment logs"
          runbook: "https://wiki.imobi.com/runbooks/deployment-failure"

      - alert: CacheHitRateLow
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.7
        for: 15m
        labels:
          severity: warning
          priority: P2
        annotations:
          summary: "Cache hit rate is low"
          description: "Cache efficiency below 70% (current: {{ $value | humanizePercentage }}). Consider checking cache TTL settings"
          runbook: "https://wiki.imobi.com/runbooks/low-cache-hit-rate"
