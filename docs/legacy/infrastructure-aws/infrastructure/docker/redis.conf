# Redis Production Configuration
# This configuration file is used in production for persistence and high availability

# Network & Port
bind 0.0.0.0
port 6379
timeout 300
tcp-backlog 511
tcp-keepalive 300

# Logging
loglevel notice
databases 16

# ========================
# RDB (Snapshot) Persistence
# ========================

# Save the DB on disk.
#
# save <seconds> <changes>
# Will save the DB if both the given number of seconds and the number of write
# operations against the DB occurred.
#
# In the example below the behavior will be to save:
# after 900 sec (15 min) if at least 1 key changed
# after 300 sec (5 min) if at least 10 keys changed
# after 60 sec if at least 10000 keys changed

save 900 1
save 300 10
save 60 10000

# By default Redis will stop accepting writes if RDB snapshots are enabled
# (at least one save point) and the latest background save has failed.
stop-writes-on-bgsave-error yes

# Compress string objects using LZF when dump .rdb databases
# for default that's set to 'yes' as it's almost always a win.
rdbcompression yes

# The RDB file name
dbfilename dump.rdb

# The working directory.
dir /data

# ========================
# AOF (Append-Only File) Persistence
# ========================

# Enable AOF (Append-Only File) for durability
# AOF provides better durability but uses more disk space and CPU
appendonly yes
appendfilename "appendonly.aof"

# AOF fsync policy:
# no: Don't fsync, let the OS handle it. Faster.
# always: fsync after every write to AOF. Safest but slowest.
# everysec: fsync once per second. Good balance (default and recommended).
appendfsync everysec

# Prevent fsync during rewrites
no-appendfsync-on-rewrite no

# Automatic AOF rewrite when file grows too much
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ========================
# Memory Management
# ========================

# Set a memory usage limit.
# Redis will evict keys following the eviction policy when this limit is reached.
maxmemory 512mb

# Memory eviction policy:
# volatile-lru: Evict using approximated LRU among keys with expire set
# allkeys-lru: Evict any key using approximated LRU
# volatile-lfu: Evict using approximated LFU among keys with expire set
# allkeys-lfu: Evict any key using approximated LFU
# volatile-random: Evict random keys with expire set
# allkeys-random: Evict random keys
# volatile-ttl: Evict keys with expire set, try to evict less recently to expire
# noeviction: Don't evict anything, return error on write
maxmemory-policy allkeys-lru

# ========================
# Replication (for High Availability)
# ========================

# Role: master or slave
# replica-read-only yes
# replica-serve-stale-data yes
# replica-disable-tcp-nodelay no

# ========================
# Security
# ========================

# Require password to access Redis
requirepass ${REDIS_PASSWORD:}

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""

# ========================
# Performance & Optimization
# ========================

# Set the number of databases
databases 16

# Maximum number of connected clients
maxclients 10000

# Background save timeout (default 600 seconds)
# Increase for large datasets
# bgsave will be terminated after this time if it's running

# Slow log configuration
slowlog-log-slower-than 10000  # microseconds
slowlog-max-len 128

# Disable SAVE in favor of BGSAVE
# save ""

# Latency monitoring
latency-monitor-threshold 0

# Event notification (for keyspace notifications)
notify-keyspace-events ""

# ========================
# Client Output Buffering
# ========================

# Set limits for output buffer during normal/pubsub mode
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ========================
# Advanced
# ========================

# Disable commands that aren't needed
# rename-command DEBUG ""
# rename-command SHUTDOWN ""

# Hash table settings
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List settings
list-compress-depth 0

# Set settings
set-max-intset-entries 512

# Sorted set settings
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Active rehashing
activerehashing yes

# Dump on shutdown
save-on-bgsave-error yes
