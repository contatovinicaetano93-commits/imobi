# PostgreSQL Production Configuration
# This configuration file is used in production for performance and durability

# ========================
# Network & Connection Settings
# ========================

listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3
unix_socket_directories = '/var/run/postgresql'

# ========================
# Memory Settings
# ========================

# shared_buffers: Set to ~25% of RAM (min 128MB)
shared_buffers = 256MB

# effective_cache_size: Set to ~50-75% of RAM
effective_cache_size = 1GB

# maintenance_work_mem: For VACUUM, CREATE INDEX, ALTER TABLE
maintenance_work_mem = 64MB

# work_mem: Per operation sort/hash work space
work_mem = 1280kB

# ========================
# WAL (Write-Ahead Logging) Settings
# ========================

wal_level = replica  # Enable archiving and replication
wal_buffers = 16MB
max_wal_senders = 10
wal_keep_size = 2GB

# Checkpoint settings
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 2GB

# WAL archiving for backups and PITR
archive_mode = on
archive_command = 'test ! -f /var/backups/imobi/postgres/wal/%f && cp %p /var/backups/imobi/postgres/wal/%f'
archive_timeout = 300

# ========================
# Query Planning & Optimization
# ========================

random_page_cost = 1.1  # For SSD, lower value preferred
effective_io_concurrency = 200
default_statistics_target = 100

# ========================
# Logging
# ========================

# Log level
log_min_messages = warning
log_min_error_statement = error

# Connections
log_connections = on
log_disconnections = on
log_duration = off

# Queries
log_statement = 'none'  # Set to 'all' to log every statement
log_min_duration_statement = 1000  # Log slow queries (>1s)

# Format
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_lock_waits = on

# Destination
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_truncate_on_rotation = on
log_rotation_age = 1d
log_rotation_size = 100MB

# ========================
# Autovacuum Settings
# ========================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ========================
# Monitoring & Statistics
# ========================

# Track query statistics
track_activities = on
track_counts = on
track_io_timing = on
track_functions = 'all'

# Statement timeout for preventing long-running queries
statement_timeout = 300000  # 5 minutes in milliseconds

# Lock timeout
lock_timeout = 30000  # 30 seconds

# Idle in transaction timeout
idle_in_transaction_session_timeout = 600000  # 10 minutes

# ========================
# Replication Settings
# ========================

# Hot standby
hot_standby = on
hot_standby_feedback = on
max_standby_streaming_delay = 30s
wal_receiver_timeout = 60s

# ========================
# Extensions
# ========================

# Load PostGIS extension
shared_preload_libraries = 'pg_stat_statements'

# PostGIS is installed via Docker image (postgis:15-3.3)

# ========================
# Debugging
# ========================

# Enable query plans
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ========================
# Client Defaults
# ========================

datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# ========================
# Custom Settings
# ========================

# Application-specific connection naming
application_name = 'imobi-api'

# ========================
# Connection String Template
# ========================

# Use this to verify settings:
# psql "postgresql://imbobi:password@localhost:5432/imbobi_prod?sslmode=require"
